# GoReleaser config for phantom-brain (pbrainctl binary).
#
# Matches the conventions used by other tools in the neverprepared
# tap (see neverprepared/mcp-slack for the canonical reference):
#   - darwin/arm64 only via this file; linux/amd64 ships from a
#     parallel job in .github/workflows/release.yaml because we
#     can't cgo-cross-compile sqlite-vec cleanly from macOS
#   - archives named {project}_{os}_{arch}.tar.gz (underscores —
#     this is goreleaser's default, the existing tap expects it)
#   - brews block pushes the formula to neverprepared/homebrew-tap
#     on every release, replacing the prior content automatically
#
# Required secrets on the phantom-brain repo:
#   HOMEBREW_TAP_TOKEN — fine-grained PAT with contents:write on
#                        neverprepared/homebrew-tap

version: 2

project_name: pbrainctl

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/pbrainctl
    binary: pbrainctl
    goos:
      - darwin
    goarch:
      - arm64
    env:
      - CGO_ENABLED=1
    # sqlite_fts5 enables BM25 full-text search in mattn/go-sqlite3;
    # internal/index requires it (panics at startup otherwise).
    tags:
      - sqlite_fts5
    ldflags:
      - -s -w
      - -X github.com/neverprepared/mcp-phantom-brain/internal/version.Version={{.Version}}
      - -X github.com/neverprepared/mcp-phantom-brain/internal/version.Commit={{.ShortCommit}}
      - -X github.com/neverprepared/mcp-phantom-brain/internal/version.BuildDate={{.Date}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

brews:
  - name: pbrainctl
    repository:
      owner: neverprepared
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
      branch: main
    directory: Formula
    homepage: "https://github.com/neverprepared/mcp-phantom-brain"
    # Short name with wordplay context. The tap convention keeps
    # descriptions ≤ 80 chars; the longer pitch lives in the repo README.
    description: "phantom-brain (pbrain) — MCP server + daemon for durable, validated long-term memory"
    license: "MIT"
    install: |
      bin.install "pbrainctl"
    caveats: |
      pbrainctl is two binaries in one — agent (`pbrainctl mcp`) and
      daemon (`pbrainctl serve`). For the agent, point your MCP host
      at it via .claude.json (or equivalent). For the daemon, set:

        PHANTOM_BRAIN_CONFIG_DIR  (default: ~/.config/phantom-brain-server)
        PHANTOM_BRAIN_DATA_DIR    (default: ~/.local/share/phantom-brain-server)

      then `pbrainctl serve`. See:
        https://github.com/neverprepared/mcp-phantom-brain#setup

release:
  github:
    owner: neverprepared
    name: mcp-phantom-brain

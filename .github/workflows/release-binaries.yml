name: Release binaries

# Fires when release-please.yml pushes a v* tag, OR on demand from
# the Actions UI (workflow_dispatch). Per-platform matrix because
# cgo + sqlite-vec means we can't cross-compile cleanly — build on
# each target's native runner instead.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to attach binaries to (e.g. v1.2.0)"
        required: true
        type: string

permissions:
  contents: write   # required to upload assets to the release

jobs:
  build:
    name: Build ${{ matrix.os_label }} (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            goos: darwin
            arch: arm64
            os_label: darwin
          - runner: ubuntu-latest
            goos: linux
            arch: amd64
            os_label: linux

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          # For workflow_dispatch we want the tag's tree, not main.
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: make build

      - name: Package
        id: pkg
        run: |
          VERSION="${{ inputs.tag || github.ref_name }}"
          NAME="pbrainctl-${VERSION}-${{ matrix.os_label }}-${{ matrix.arch }}"
          mkdir -p "dist/$NAME"
          cp pbrainctl LICENSE README.md "dist/$NAME/" 2>/dev/null || cp pbrainctl README.md "dist/$NAME/"
          tar -C dist -czf "dist/$NAME.tar.gz" "$NAME"
          shasum -a 256 "dist/$NAME.tar.gz" | awk '{print $1"  "$2}' > "dist/$NAME.tar.gz.sha256"
          # Strip the dist/ prefix in the printed paths so the
          # upload-artifact step picks them up cleanly.
          ls -lh "dist/$NAME.tar.gz" "dist/$NAME.tar.gz.sha256"
          echo "artifact_name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            dist/${{ steps.pkg.outputs.artifact_name }}.tar.gz
            dist/${{ steps.pkg.outputs.artifact_name }}.tar.gz.sha256
          fail_on_unmatched_files: true

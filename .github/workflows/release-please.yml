name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# Language-agnostic — uses release-type "simple" (no package.json
# required). After the TS retirement to legacy-ts/ the previous
# node-typed config broke on every push. The publish job that ran
# `npm publish` was also dropped: legacy-ts/ is frozen and not
# meant to be re-published; the Go binary will get its own release
# pipeline in a follow-up when there's a real distribution story.
jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

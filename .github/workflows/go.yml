name: Go

on:
  push:
    branches: [main, feat/go-rewrite]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel the macOS run when Linux fails (or vice versa) —
      # we want full signal on platform-specific regressions.
      fail-fast: false
      matrix:
        os:
          - macos-14       # Apple Silicon (arm64) — sqlite-vec-darwin-arm64.dylib
          - ubuntu-latest  # x86_64 — sqlite-vec-linux-amd64.so (Phase 5)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet -tags=sqlite_fts5 ./...

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Race test (brain + server)
        run: go test -tags=sqlite_fts5 -race -count=1 -timeout=180s ./internal/brain/... ./internal/server/...

name: release

# Attaches platform binaries to the GitHub Release that release-please
# already created (release-type "simple", draft:false) and publishes a
# multi-platform Homebrew formula to neverprepared/homebrew-tap.
#
# Two stages:
#
#   build  — matrix over NATIVE runners. pbrainctl needs CGO +
#            sqlite_fts5 and sqlite-vec won't cgo-cross-compile, so
#            every platform compiles on its own OS. Each leg packages
#            pbrainctl_<os>_<arch>.tar.gz (binary at archive root) plus
#            a .sha256, and uploads them as an artifact.
#
#   publish — downloads every leg's archive, uploads them all to the
#            release, then renders Formula/pbrainctl.rb with an
#            on_macos + on_linux stanza and pushes it to the tap.
#
# We don't use GoReleaser: its multi-runner merge + prebuilt builder
# are Pro-only, and release-please already owns the GitHub Release. A
# templated formula is the free path to a Linux-capable `brew install`.
#
# Add a platform: add a matrix leg below and a matching stanza in the
# formula heredoc in the publish job. Keep the two in lockstep.
#
# Required secret:
#   HOMEBREW_TAP_TOKEN — fine-grained PAT with contents:write on
#                        neverprepared/homebrew-tap.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build + attach binaries to (e.g. v1.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - { os: macos-14,      goos: darwin, goarch: arm64 }
          - { os: ubuntu-latest, goos: linux,  goarch: amd64 }
          # Future platforms (add a matching formula stanza too):
          #   - { os: macos-13,         goos: darwin, goarch: amd64 }
          #   - { os: ubuntu-24.04-arm, goos: linux,  goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build + package
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          # Override the Makefile's := VERSION default so internal/version
          # carries the real tag. Command-line assignment wins over :=.
          make build VERSION="$TAG"
          ./pbrainctl client version   # fail fast if the binary won't run/stamp

          NAME="pbrainctl_${GOOS}_${GOARCH}"
          mkdir -p out
          # Binary at the archive ROOT (no wrapping dir) so the formula's
          # `bin.install "pbrainctl"` works without a cd.
          tar -czf "out/${NAME}.tar.gz" pbrainctl LICENSE README.md
          shasum -a 256 "out/${NAME}.tar.gz" | awk '{print $1}' \
              > "out/${NAME}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: asset_${{ matrix.goos }}_${{ matrix.goarch }}
          path: out/*
          if-no-files-found: error
          retention-days: 1

  publish:
    name: upload assets + push formula
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets
          pattern: asset_*
          merge-multiple: true

      - name: Upload archives to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            assets/*.tar.gz
            assets/*.tar.gz.sha256
          fail_on_unmatched_files: true

      - name: Render + publish Homebrew formula
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
          REPO: ${{ github.repository }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          VER="${TAG#v}"
          base="https://github.com/${REPO}/releases/download/${TAG}"
          darwin_arm64_sha="$(cat assets/pbrainctl_darwin_arm64.tar.gz.sha256)"
          linux_amd64_sha="$(cat assets/pbrainctl_linux_amd64.tar.gz.sha256)"

          mkdir -p tap/Formula
          # Unquoted heredoc: shell expands ${...}; Ruby's #{bin} has no
          # leading $, so it passes through literally.
          cat > tap/Formula/pbrainctl.rb <<EOF
          # typed: false
          # frozen_string_literal: true
          #
          # Generated by neverprepared/phantom-brain release workflow.
          # Do not edit by hand — changes are overwritten on next release.
          class Pbrainctl < Formula
            desc "phantom-brain (pbrain) — MCP server + daemon for durable, validated long-term memory"
            homepage "https://github.com/neverprepared/phantom-brain"
            version "${VER}"
            license "MIT"

            on_macos do
              on_arm do
                url "${base}/pbrainctl_darwin_arm64.tar.gz"
                sha256 "${darwin_arm64_sha}"
              end
            end

            on_linux do
              on_intel do
                url "${base}/pbrainctl_linux_amd64.tar.gz"
                sha256 "${linux_amd64_sha}"
              end
            end

            def install
              bin.install "pbrainctl"
            end

            def caveats
              <<~CAVEAT
                pbrainctl is two roles in one binary — agent (\`pbrainctl client mcp\`)
                and daemon (\`pbrainctl server serve\`). For the agent, point your
                MCP host at it via .claude.json (or equivalent). For the daemon, set:

                  PHANTOM_BRAIN_CONFIG_DIR  (default: ~/.config/phantom-brain-server)
                  PHANTOM_BRAIN_DATA_DIR    (default: ~/.local/share/phantom-brain-server)

                then \`pbrainctl server serve\`. See:
                  https://github.com/neverprepared/phantom-brain#setup
              CAVEAT
            end

            test do
              system "#{bin}/pbrainctl", "client", "version"
            end
          end
          EOF

          git clone --depth 1 \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/neverprepared/homebrew-tap.git" taprepo
          mkdir -p taprepo/Formula
          cp tap/Formula/pbrainctl.rb taprepo/Formula/pbrainctl.rb
          cd taprepo
          if git diff --quiet -- Formula/pbrainctl.rb; then
            echo "Formula unchanged — nothing to push."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/pbrainctl.rb
          git commit -m "pbrainctl ${VER}"
          git push

# Bifrost — OpenAI-compatible AI gateway (https://docs.getbifrost.ai).
#
# Standalone satellite stack, same pattern as docker/ollama/. Bifrost
# fronts 1000+ models behind one OpenAI-compatible API; point any
# OpenAI client (or phantom-brain's synth backend, via an OpenAI-shaped
# base_url) at it instead of talking to each provider directly.
#
# OLLAMA-FIRST: the shipped config.example.json registers a local Ollama
# provider only — no cloud keys needed to launch. The container reaches
# Ollama on the host (native `ollama serve`, or the docker/ollama stack
# published on the host) via host.docker.internal:11434 (see extra_hosts
# + config.json network_config.base_url). Add cloud providers later in
# the UI or config.json.
#
# Quick start:
#   cd docker/bifrost
#   mkdir -p data
#   cp config.example.json data/config.json    # Ollama-first, no keys required
#   docker compose up -d
#   docker compose logs -f bifrost
#   open http://localhost:8080                  # web UI + config
#   # add cloud providers later: cp .env.example .env  (set OPENAI_API_KEY etc.)
#
# Tear down:
#   docker compose down                        # stops, keeps data/
#   docker compose down && rm -rf data         # full reset
#
# The mounted ./data dir IS Bifrost's app-dir — it holds config.json
# (optional, file-backed config), config.db (UI/API edits), and
# logs.db (request logs). Config precedence: a file-backed entity in
# config.json overwrites the DB copy on a content-hash change; entities
# only present in the DB (added via the UI) are preserved.

services:
  bifrost:
    image: maximhq/bifrost:${BIFROST_VERSION:-latest}
    container_name: bifrost
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      # APP_HOST defaults to localhost, which inside a container binds
      # only the loopback inside that container — unreachable from the
      # host. 0.0.0.0 is REQUIRED for the published port to work.
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      LOG_LEVEL: ${LOG_LEVEL:-info}      # debug | info | warn | error
      LOG_STYLE: ${LOG_STYLE:-json}      # pretty | json
      # Optional cloud-provider keys, referenced from config.json as
      # `env.OPENAI_API_KEY` etc. Not needed for the Ollama-first launch;
      # empty defaults keep `docker compose up` working with zero config.
      # Set them in .env once you add the matching provider blocks.
      OPENAI_API_KEY:    ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    extra_hosts:
      # Lets the Bifrost container reach an Ollama running on the docker
      # host — native `ollama serve` on macOS/Windows (Docker can't reach
      # Metal, so Ollama runs natively there) or the docker/ollama stack
      # published on the host. config.json points base_url here.
      - "host.docker.internal:host-gateway"
    volumes:
      # This bind-mount is Bifrost's app-dir (/app/data): config.json,
      # config.db, logs.db all live here so they survive recreation.
      - ./data:/app/data
    healthcheck:
      # /metrics is Bifrost's built-in Prometheus endpoint — a cheap
      # liveness probe. If your image tag lacks wget, swap to curl or
      # comment this block out.
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/metrics >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

# Single-host stack: MinIO + the phantom-brain daemon, both
# running in containers, brought up with `docker compose up`.
#
# Sized for a personal / single-operator deploy. Defaults:
#   - bind-mounts ./data/{minio,pbrainctl} for state durability
#   - bucket auto-created via an mc-init one-shot container
#   - pbrainctl uses host networking so presigned-URL hostnames
#     (configured as localhost in server.toml) are routable both
#     from inside the container and from agents on the host
#
# Quick start:
#   cd docker
#   cp .env.example .env                 # set MINIO_ROOT_USER + secrets + bearer token
#   cp -r config-example config          # edit config/server.toml + auth.toml if needed
#   docker compose up -d --build
#   docker compose logs -f pbrainctl
#
# Tear down:
#   docker compose down                  # stops containers, keeps data
#   docker compose down -v && rm -rf data  # full reset

services:
  # OpenSearch: canonical store for synthesized content (summaries,
  # entities, attachments + extracted text). Phase 6 makes this the
  # source of truth; agents pull SQLite snapshot exports for local
  # caching. Single-node, dev mode (security plugin disabled) — fine
  # for personal/single-operator deploy on a trusted network.
  opensearch:
    image: opensearchproject/opensearch:2.18.0
    container_name: pbrain-opensearch
    restart: unless-stopped
    # Mapped to 9201 on the host to avoid colliding with an
    # operator-run OS at :9200. Daemon reaches it via the compose
    # service name `opensearch:9200`, so the host mapping is purely
    # for ad-hoc debugging (curl from your laptop).
    ports:
      - "9201:9200"
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      bootstrap.memory_lock: "true"
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile:  { soft: 65536, hard: 65536 }
    volumes:
      - ./data/opensearch:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -q -e '\"status\":\"green\"' -e '\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 12

  # OpenSearch Dashboards: the UI for poking at pb_summaries /
  # pb_entities / pb_attachments docs. Not required by the daemon —
  # comment out the service if you don't need it (saves ~400 MB
  # image + ~512 MB RAM idle).
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.18.0
    container_name: pbrain-opensearch-dashboards
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    depends_on:
      opensearch:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    container_name: pbrain-minio
    restart: unless-stopped
    ports:
      - "9000:9000"      # S3 API
      - "9001:9001"      # web console
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
      # Bake the public URL into presigned signatures so agents
      # on the host get URLs they can actually reach.
      MINIO_SERVER_URL:    ${MINIO_PUBLIC_URL:-http://localhost:9000}
    volumes:
      - ./data/minio:/data
    command: server --console-address ":9001" /data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot bucket-creation container. Exits 0 once the bucket
  # exists; depended on by pbrainctl so the daemon never starts
  # against a missing bucket.
  mc-init:
    image: minio/mc:latest
    container_name: pbrain-mc-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      BUCKET:              ${PB_BUCKET:-phantom-brain}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\"; do
          echo 'waiting for minio…' && sleep 1;
      done;
      mc mb --ignore-existing local/$$BUCKET;
      mc ilm rule add --expire-days 1 --filter '*/_uploads/*' local/$$BUCKET 2>/dev/null || true;
      echo 'bucket $$BUCKET ready';
      "
    restart: "no"

  pbrainctl:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pbrain-daemon
    restart: unless-stopped
    # Bridge networking (default) + explicit port. host networking
    # is broken on Docker Desktop (Mac/Win run containers in a VM,
    # so "host" means the VM's network, not your laptop) — port
    # forwarding works everywhere. The daemon reaches MinIO via the
    # endpoint configured in server.toml; for setups where MinIO has
    # public DNS (the typical case), no extra host-mapping needed.
    # For localhost-only MinIO, add:
    #   extra_hosts: ["host.docker.internal:host-gateway"]
    # and use host.docker.internal:9000 as minio_endpoint.
    ports:
      - "9998:9998"
    depends_on:
      mc-init:
        condition: service_completed_successfully
      opensearch:
        condition: service_healthy
    environment:
      PHANTOM_BRAIN_DATA_DIR:   /data
      PHANTOM_BRAIN_CONFIG_DIR: /config
      # The daemon's SynthWorker shells out to `claude` (bundled in
      # the image) for gate + distill. Pass a Claude Code OAuth
      # token generated locally via `claude setup-token`. Without
      # this var the CLI is on PATH but unauthenticated, and the
      # synth pipeline falls back to copying raw_body as the
      # summary (no gate verdict, no topic classification).
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
    volumes:
      - ./config:/config:ro
      - ./data/pbrainctl:/data
    # Dockerfile's ENTRYPOINT is `pbrainctl` and CMD is
    # `server serve` (v3.0 client/server group restructure),
    # so no override needed. If you add a `command:` here it
    # replaces the CMD — write `["server", "serve"]`, not the
    # literal `pbrainctl server serve`.

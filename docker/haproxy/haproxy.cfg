# HAProxy — HA / load balancing in front of N Ollama instances.
#
# Why: in the OpenSearch-native redesign (epic #92) embedding gets
# centralized — the OpenSearch ml-commons connector (and clients) call
# Ollama for every doc + every query. Front those instances with one
# VIP so capacity scales and a dead/cold instance is routed around.
#
# Point the OpenSearch connector + any clients at this VIP
# (host:11435 by default — see docker-compose.yml port mapping).
#
# NOTE: load balancing only adds capacity across SEPARATE hardware
# (separate GPUs/CPUs); multiple Ollama processes on one GPU just
# contend. Keep each instance's model warm (OLLAMA_KEEP_ALIVE).
#
# Validate this file:  haproxy -c -f docker/haproxy/haproxy.cfg

global
    log stdout format raw local0
    maxconn 4096

defaults
    mode http
    log global
    option httplog
    option dontlognull
    # Embeddings are short; generation (if these instances also serve it)
    # can be longer. 120s is safe headroom without hanging on a dead peer.
    timeout connect 5s
    timeout client  120s
    timeout server  120s

# The load-balanced Ollama endpoint. Clients + the OS connector hit this.
frontend ollama_fe
    bind *:11434
    default_backend ollama_be

backend ollama_be
    balance leastconn
    # Active health check — Ollama returns 200 on /api/version when up.
    # fall 3 / rise 2: 3 failed probes marks down, 2 good brings it back.
    option httpchk GET /api/version
    http-check expect status 200
    default-server check inter 5s fall 3 rise 2 maxconn 64
    # ---- EDIT: your Ollama instances (separate hardware = real capacity) ----
    server ollama1 host.docker.internal:11434
    # server ollama2 10.0.0.12:11434
    # server ollama3 10.0.0.13:11434

# Stats / health UI at http://<host>:8404/
listen stats
    bind *:8404
    stats enable
    stats uri /
    stats refresh 5s

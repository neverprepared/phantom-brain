# Template — copy the parent dir to ./config and edit values
# that don't match your .env (most don't need changing).

[server]
port = 9998
host = "0.0.0.0"
log_level = "info"

[storage]
backend = "minio"
# Daemon talks to MinIO via the service name in the compose
# network. Presigned URLs use MINIO_PUBLIC_URL (which is
# baked into MinIO's signatures via MINIO_SERVER_URL).
minio_endpoint   = "minio:9000"
minio_bucket     = "phantom-brain"
minio_access_key = "minioadmin"
minio_secret_key = "replace_me_with_a_strong_password"
minio_use_ssl    = false

# Phase 6: OpenSearch is the canonical store for synthesised
# content. Without this block the daemon still serves /health and
# /snapshot/*, but POST /api/brain/{perceive,learn,attach,trace}
# all return 503.
[opensearch]
addresses            = ["http://opensearch:9200"]
# Leave username/password empty to use the docker-compose dev-mode
# OS container (security plugin disabled). Real clusters set both.
username             = ""
password             = ""
insecure_skip_verify = false
# Sandbox prefix lets multiple deploys share a cluster. Leave
# empty for the canonical pb_summaries / pb_entities / pb_attachments.
index_prefix         = ""
request_timeout_secs = 10

# Postgres — System of Record for the OpenSearch-native redesign
# (epic #92, docs/design/daemon-cutover-plan.md). OPTIONAL + DORMANT:
# leave the whole block out and the daemon behaves exactly as before
# (Phase A resolution is non-fatal when unconfigured). Uncomment to
# make per-binding Postgres handles resolvable; nothing reads them
# until you set `dual_write = true` on a binding's config.toml.
#
# `dsn` is the BASE / maintenance DSN. Per-profile databases
# (pb_<profile>) are derived from it automatically. The HOST differs
# by who connects:
#   - the DAEMON (this file, inside the compose network) uses the
#     compose service name + the INTERNAL port:  postgres:5432
#   - `pbrainctl` run from the HOST (db provision / backfill-to-pg)
#     uses the published host port:              localhost:5433
# So this DSN uses postgres:5432; your host-shell --dsn uses :5433.
#
# Provision each profile's DB before the daemon relies on it:
#   pbrainctl server db provision <profile> \
#       --dsn postgres://pbrain:<pw>@localhost:5433/phantom_brain
# then reload:  pbrainctl server vault reload
#
# [postgres]
# dsn = "postgres://pbrain:replace_me_with_a_strong_password@postgres:5432/phantom_brain"

# Phase 6: raw-source capture for brain_perceive. When enabled, the
# daemon's SynthWorker fetches each perceived URL on synth and
# stores the response bytes in MinIO at
# <profile>/<vault>/attachments/captures-<doc_sha><ext>. Retrieve
# via GET /api/brain/capture/{sha}. Without this, brain_perceive
# only preserves what the agent extracted; the original page is
# unrecoverable if the source URL changes or disappears.
[capture]
enabled        = true
max_bytes      = 10485760   # 10 MB; non-2xx or larger response is a non-fatal error
timeout_secs   = 30
# user_agent  = "phantom-brain/2"  # uncomment to override default

# Synth LLM backend — runs the gate verdict, distillation, and entity
# extraction. Default is Ollama (local, zero Claude tokens). The model
# MUST be pulled on the Ollama host first: `ollama pull qwen2.5:7b`.
# Set backend = "claude" to use the bundled `claude` CLI instead (needs
# CLAUDE_CODE_OAUTH_TOKEN; higher quality, costs tokens). Env overrides:
# PB_SYNTH_BACKEND, PB_SYNTH_OLLAMA_MODEL, OLLAMA_BASE_URL, PB_SYNTH_TIMEOUT_SECS.
[synth]
backend         = "ollama"
ollama_base_url = "http://ollama:11434"   # compose service; host shell uses localhost:11434
ollama_model    = "qwen2.5:7b"
# Per-call ceiling (seconds) for each synth LLM call (gate verdict + distill).
# Default 120. Local Ollama is slower than the Claude CLI and the FIRST job
# after a restart pays model cold-load, so keep this generous. Env override:
# PB_SYNTH_TIMEOUT_SECS.
timeout_secs    = 120

[defaults]
retention_gens = 30
reaper_poll_interval_secs = 5

version: "2"
sql:
  - engine: "postgresql"
    schema: "migrations"
    queries: "internal/pgstore/queries"
    gen:
      go:
        package: "pgdb"
        out: "internal/pgstore/pgdb"
        sql_package: "pgx/v5"
        emit_json_tags: false
        emit_interface: true
        emit_empty_slices: true
        # Map pgvector vector(768) columns to a real Go type. Nullable
        # embedding columns become *pgvector.Vector so a NULL scans to nil
        # (the ListUnsynthesised path returns rows with NULL embedding).
        overrides:
          - db_type: "vector"
            go_type:
              import: "github.com/pgvector/pgvector-go"
              package: "pgvector"
              type: "Vector"
          - db_type: "vector"
            nullable: true
            go_type:
              import: "github.com/pgvector/pgvector-go"
              package: "pgvector"
              type: "Vector"
              pointer: true
